<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Light Grove — Map Draft 1</title>
<style>
  html,body{margin:0;background:#070b18;display:flex;justify-content:center;align-items:center;min-height:100vh}
  svg{max-width:100vw;max-height:100vh}
  text{font-family:Georgia,'Times New Roman',serif;fill:#cfd8ee}
  .region{font-size:21px;font-weight:bold;letter-spacing:2px;fill:#e8edf9}
  .sub{font-size:14px;fill:#8fa0c5;font-style:italic}
  .tiny{font-size:12.5px;fill:#a9b6d6}
  .canon{fill:#ffd98a}
</style>
</head>
<body>
<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f2e3a8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f2e3a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f22"/>
      <stop offset="100%" stop-color="#101830"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13294a"/>
      <stop offset="100%" stop-color="#1a355c"/>
    </linearGradient>
    <linearGradient id="woodsfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060d0c"/>
      <stop offset="100%" stop-color="#11271f"/>
    </linearGradient>
  </defs>

  <!-- night ground -->
  <rect width="1400" height="1000" fill="url(#night)"/>

  <!-- stars -->
  <g fill="#dfe6ff" opacity="0.8">
    <circle cx="320" cy="70" r="1.4"/><circle cx="520" cy="50" r="1.1"/><circle cx="660" cy="90" r="1.6"/>
    <circle cx="840" cy="55" r="1.2"/><circle cx="980" cy="85" r="1.5"/><circle cx="450" cy="110" r="1"/>
    <circle cx="1240" cy="60" r="1.3"/><circle cx="80" cy="220" r="1.2"/><circle cx="1330" cy="300" r="1.4"/>
    <circle cx="60" cy="600" r="1.2"/><circle cx="1350" cy="700" r="1.2"/><circle cx="200" cy="950" r="1.1"/>
    <circle cx="1100" cy="940" r="1.3"/><circle cx="730" cy="40" r="1"/>
  </g>

  <!-- coast (north) -->
  <path d="M40,40 H1360 V150 C1240,185 1130,140 1010,168 C880,198 760,150 620,172 C480,194 340,150 200,176 C140,187 80,170 40,178 Z" fill="url(#water)"/>
  <path d="M40,178 C80,170 140,187 200,176 C340,150 480,194 620,172 C760,150 880,198 1010,168 C1130,140 1240,185 1360,150" fill="none" stroke="#5e7eb0" stroke-width="2" opacity="0.7"/>
  <text x="350" y="105" class="region" opacity="0.9">THE COAST</text>
  <text x="350" y="126" class="sub">placement proposed ○</text>

  <!-- lighthouse on remote point -->
  <path d="M1150,150 L1210,150 L1195,185 L1165,185 Z" fill="#1b2742"/>
  <g transform="translate(1180,118)">
    <rect x="-7" y="0" width="14" height="34" fill="#43507a"/>
    <rect x="-9" y="-8" width="18" height="9" fill="#ffd98a"/>
    <path d="M9,-4 L60,-16 L60,8 Z" fill="#ffd98a" opacity="0.18"/>
    <path d="M-9,-4 L-60,-16 L-60,8 Z" fill="#ffd98a" opacity="0.18"/>
  </g>
  <text x="1108" y="222" class="region" style="font-size:17px">LIGHTHOUSE</text>
  <text x="1108" y="241" class="sub">remote, on the coast ● · keeper unknown</text>

  <!-- moon -->
  <circle cx="170" cy="115" r="95" fill="url(#moonglow)"/>
  <circle cx="170" cy="115" r="42" fill="#f6ecc4"/>
  <circle cx="158" cy="104" r="7" fill="#e3d6a8"/><circle cx="184" cy="126" r="5" fill="#e3d6a8"/><circle cx="172" cy="92" r="3.5" fill="#e3d6a8"/>

  <!-- deep woods (west) -->
  <rect x="55" y="235" width="370" height="580" rx="60" fill="url(#woodsfade)" opacity="0.95"/>
  <g fill="#0f2e23" stroke="#1d4a38" stroke-width="1">
    <path d="M100,320 l18,-34 l18,34 Z"/><path d="M150,290 l16,-30 l16,30 Z"/><path d="M210,330 l18,-34 l18,34 Z"/>
    <path d="M280,300 l16,-30 l16,30 Z"/><path d="M340,340 l18,-34 l18,34 Z"/><path d="M120,420 l18,-34 l18,34 Z"/>
    <path d="M300,420 l16,-30 l16,30 Z"/><path d="M360,470 l18,-34 l18,34 Z"/><path d="M100,540 l16,-30 l16,30 Z"/>
    <path d="M170,580 l18,-34 l18,34 Z"/><path d="M250,540 l16,-30 l16,30 Z"/><path d="M330,600 l18,-34 l18,34 Z"/>
    <path d="M120,680 l18,-34 l18,34 Z"/><path d="M210,720 l16,-30 l16,30 Z"/><path d="M300,690 l18,-34 l18,34 Z"/>
    <path d="M370,740 l16,-30 l16,30 Z"/>
  </g>
  <text x="120" y="255" class="region">DEEP WOODS</text>
  <text x="120" y="276" class="sub">west ● · deeper = darker ●</text>

  <!-- Briar's shack -->
  <g transform="translate(205,455)">
    <rect x="-14" y="-10" width="28" height="18" fill="#3a2f24"/>
    <path d="M-18,-10 L0,-24 L18,-10 Z" fill="#52432f"/>
    <circle cx="8" cy="-2" r="2.5" fill="#ffd98a"/>
  </g>
  <text x="160" y="492" class="tiny">Briar's shack ●</text>

  <!-- Hazel's cottage at the woods' edge -->
  <g transform="translate(465,575)">
    <rect x="-16" y="-12" width="32" height="22" fill="#4a3a52"/>
    <path d="M-20,-12 L0,-30 L20,-12 Z" fill="#6b5478"/>
    <circle cx="-6" cy="-2" r="3" fill="#ffd98a"/><circle cx="8" cy="-2" r="3" fill="#ffd98a"/>
  </g>
  <text x="430" y="618" class="tiny">HAZEL'S COTTAGE ●</text>
  <text x="430" y="634" class="tiny" style="fill:#7c8cb0;font-style:italic">woods at her west door</text>

  <!-- central mountain + manor -->
  <path d="M545,310 L880,310 L915,475 L835,575 L630,575 L520,470 Z" fill="#1b2547" stroke="#3a4a7c" stroke-width="2"/>
  <path d="M630,575 L655,600 L700,585 L745,608 L800,588 L835,575" fill="none" stroke="#56689c" stroke-width="3"/>
  <path d="M640,585 l-6,18 M700,592 l-4,20 M760,598 l-5,19 M810,590 l-4,18" stroke="#36436f" stroke-width="2"/>

  <!-- manor silhouette -->
  <g transform="translate(712,268)">
    <rect x="-34" y="10" width="68" height="40" fill="#2c3760"/>
    <rect x="-48" y="26" width="22" height="24" fill="#27305551"/>
    <rect x="-50" y="24" width="24" height="26" fill="#273055"/>
    <rect x="26" y="18" width="26" height="32" fill="#273055"/>
    <path d="M-38,10 L0,-18 L38,10 Z" fill="#39466f"/>
    <rect x="12" y="-26" width="18" height="36" fill="#313e68"/>
    <path d="M10,-26 L21,-44 L32,-26 Z" fill="#46557f"/>
    <circle cx="-12" cy="24" r="3.4" fill="#ffd98a"/><circle cx="8" cy="24" r="3.4" fill="#ffd98a"/><circle cx="21" cy="-12" r="3" fill="#ffd98a"/>
  </g>
  <text x="640" y="248" class="region canon">THE MANOR</text>
  <text x="618" y="228" class="sub">clifftop, center of the Grove ●</text>

  <!-- farm plateau -->
  <g stroke="#3f9468" stroke-width="2" opacity="0.75">
    <path d="M570,370 h78 M570,386 h78 M570,402 h78 M570,418 h78"/>
  </g>
  <text x="560" y="354" class="tiny">farm fields ○</text>

  <!-- graveyard on the slope -->
  <g fill="#5a668e">
    <rect x="652" y="498" width="9" height="13" rx="4"/><rect x="672" y="504" width="9" height="13" rx="4"/>
    <rect x="692" y="497" width="9" height="13" rx="4"/><rect x="712" y="505" width="9" height="13" rx="4"/>
  </g>
  <g transform="translate(745,505)">
    <rect x="-9" y="-7" width="18" height="13" fill="#3a3328"/>
    <path d="M-12,-7 L0,-17 L12,-7 Z" fill="#4f4534"/>
  </g>
  <text x="610" y="490" class="tiny">GRAVEYARD ● <tspan style="fill:#7c8cb0;font-style:italic">· Cliff's hut, before the mansion ●</tspan></text>

  <!-- cliff stair -->
  <path d="M725,608 l-12,14 l16,10 l-12,14 l16,10 l-12,14" fill="none" stroke="#8fa0c5" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="745" y="650" class="tiny">cliff stair ○</text>

  <!-- town center -->
  <rect x="630" y="700" width="190" height="120" rx="14" fill="#1d2138" stroke="#4a4368" stroke-width="2"/>
  <rect x="700" y="742" width="52" height="38" rx="4" fill="#2a2f4e"/>
  <g>
    <rect x="643" y="714" width="44" height="30" rx="3" fill="#33305a"/><circle cx="665" cy="729" r="3" fill="#ffd98a"/>
    <rect x="762" y="714" width="46" height="30" rx="3" fill="#33305a"/><circle cx="785" cy="729" r="3" fill="#ffd98a"/>
    <rect x="643" y="780" width="44" height="30" rx="3" fill="#33305a"/><circle cx="665" cy="795" r="3" fill="#ffd98a"/>
    <rect x="762" y="780" width="46" height="30" rx="3" fill="#33305a"/><circle cx="785" cy="795" r="3" fill="#ffd98a"/>
  </g>
  <text x="638" y="690" class="region canon" style="font-size:19px">TOWN CENTER ●</text>
  <text x="838" y="722" class="tiny">Benny's bar ●</text>
  <text x="838" y="740" class="tiny">museum ● · library ●</text>
  <text x="838" y="758" class="tiny">general store (owner TBD)</text>
  <text x="838" y="776" class="tiny">festival square ●</text>
  <text x="638" y="845" class="tiny" style="fill:#7fc7b0">SEWERS beneath ● — Marshal's home ●</text>

  <!-- sanctuary -->
  <g stroke="#7a6b4f" stroke-width="2" fill="none">
    <rect x="468" y="742" width="110" height="66" rx="10"/>
    <path d="M468,775 h110 M523,742 v66"/>
  </g>
  <circle cx="497" cy="762" r="6" fill="#6da37e"/>
  <circle cx="551" cy="792" r="7" fill="#9a7fb8"/>
  <text x="438" y="730" class="region" style="font-size:16px">MONSTER SANCTUARY ○</text>
  <text x="468" y="828" class="tiny">Myra &amp; Alice's place ·  paddocks</text>

  <!-- victor's lab -->
  <g transform="translate(1185,520)">
    <rect x="-30" y="-14" width="60" height="42" fill="#2c3354"/>
    <rect x="-8" y="-46" width="16" height="34" fill="#3a4268"/>
    <circle cx="0" cy="-52" r="7" fill="none" stroke="#9fe0ff" stroke-width="2.5"/>
    <path d="M0,-59 l-6,-12 M0,-59 l7,-10" stroke="#9fe0ff" stroke-width="2"/>
    <circle cx="-14" cy="2" r="3.4" fill="#9fe0ff"/><circle cx="12" cy="2" r="3.4" fill="#ffd98a"/>
  </g>
  <text x="1105" y="592" class="region" style="font-size:17px">VICTOR'S LAB</text>
  <text x="1105" y="611" class="sub">eastern edge of town ●</text>

  <!-- cornfield -->
  <g stroke="#a8893f" stroke-width="2" opacity="0.8">
    <path d="M965,742 h150 M965,760 h150 M965,778 h150 M965,796 h150 M965,814 h150"/>
  </g>
  <g transform="translate(1040,768)" stroke="#d9b96a" stroke-width="3">
    <path d="M0,-26 V10 M-14,-14 H14"/>
    <circle cx="0" cy="-30" r="8" fill="#e0913f" stroke="none"/>
  </g>
  <text x="965" y="726" class="region" style="font-size:17px">CORNFIELD ○</text>
  <text x="1128" y="800" class="tiny">Jack ●</text>

  <!-- river: in through the veil (SW), under town, out to the coast (NE) -->
  <path d="M95,945 C260,905 420,890 560,855 C640,835 660,810 655,800"
        fill="none" stroke="#3f6ea8" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  <path d="M655,800 C700,792 760,780 815,768" fill="none" stroke="#3f6ea8" stroke-width="8" stroke-dasharray="10 9" opacity="0.6"/>
  <path d="M815,768 C900,740 935,640 950,540 C963,448 1000,300 1058,185"
        fill="none" stroke="#3f6ea8" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  <text x="120" y="975" class="tiny" style="fill:#7fa3d4">the river ● — Marshal's road in ●</text>
  <text x="855" y="700" class="tiny" style="fill:#7fa3d4;font-style:italic">(runs beneath the town → sewers ○)</text>

  <!-- footpaths -->
  <g stroke="#6b6480" stroke-width="2" stroke-dasharray="3 6" fill="none" opacity="0.8">
    <path d="M820,760 C900,740 1040,690 1120,560"/>
    <path d="M820,790 C880,800 920,790 962,778"/>
    <path d="M630,770 C605,768 590,770 578,772"/>
    <path d="M468,772 C440,740 430,680 448,610"/>
    <path d="M725,700 C722,672 722,650 723,640"/>
  </g>

  <!-- the veil -->
  <rect x="42" y="42" width="1316" height="916" rx="36" fill="none" stroke="#b9a8e8" stroke-width="2.5" stroke-dasharray="14 10" opacity="0.5"/>
  <text x="540" y="32" class="sub" style="font-size:15px;fill:#b9a8e8">~ THE VEIL ~  beyond: the ordinary, daylit world</text>

  <!-- title + legend -->
  <text x="1010" y="935" class="region" style="font-size:24px;letter-spacing:4px">GHOST LIGHT GROVE</text>
  <text x="1010" y="956" class="sub">map draft 1 — nothing is final</text>
  <text x="445" y="935" class="tiny">● placed by canon</text>
  <text x="445" y="953" class="tiny">○ proposed — movable</text>
</svg>
</body>
</html>
